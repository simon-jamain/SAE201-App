{% extends "base.html" %}
{% block titre %}Accueil · AMELI Data{% endblock %}
{% block contenu %}

<h1 class="page-heading">Consulter les effectifs</h1>

<div class="form-card">
  <h3>Filtres et indicateurs</h3>
  <form action="{{ url_for('effectifs.afficher') }}" method="get">

    <div class="field">
      <label for="profession">Profession</label>
      <select name="profession_id" id="profession" required>
        <option value="">— Choisir —</option>
        {% for p in professions %}
        <option value="{{ p.id }}">{{ p.libelle }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="field">
      <label for="region">Région</label>
      <select name="region_id" id="region">
        <option value="">— Choisir —</option>
        {% for r in regions %}
        <option value="{{ r.id }}">{{ r.libelle }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="field">
      <label for="departement">Département</label>
      <select name="departement_id" id="departement" required>
        <option value="">— Choisir une région —</option>
      </select>
    </div>

    <div class="field">
      <label for="annee">Année</label>
      <select name="annee" id="annee" required>
        {% for a in range(2023, 2014, -1) %}
        <option value="{{ a }}">{{ a }}</option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Afficher les effectifs
    </button>

  </form>
</div>

<script>const BASE_URL = "{{ BASE_URL }}";</script>
<script src="{{ url_for('static', filename='js/cascade.js') }}"></script>
{% endblock %}
