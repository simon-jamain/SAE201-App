{% extends "base.html" %}

{% block titre %}Pathologies{% endblock %}

{% block contenu %}
  <script src="https://cdn.plot.ly/plotly-2.24.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <h1 style="font-size:2rem; margin-bottom:24px;">Pathologies</h1>

    <div class="patho-controls">
      <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab(event,'tab-viz')">Type de visualisation</button>
        <button class="tab-btn" onclick="switchTab(event,'tab-filters')">Filtres et indicateurs</button>
      </div>

      <div id="tab-viz" class="tab-content active">
        <div class="viz-section">
          <label>Choisissez le type de visualisation</label>
          <div class="viz-buttons">
            <button class="viz-btn active" onclick="setViz(event,'table')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
              Tableau
            </button>
            <button class="viz-btn" onclick="setViz(event,'chart')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              Graphe
            </button>
            <button class="viz-btn" onclick="setViz(event,'map')">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
              Carte
            </button>
          </div>
        </div>
      </div>

      <div id="tab-filters" class="tab-content">
        <div class="filters-grid">
          <div class="filter-group">
            <label for="sel-indicator">Indicateur</label>
            <select id="sel-indicator">
              <option value="nombre_patients">Nombre de patients</option>
              <option value="taux_prevalence">Taux de prévalence (%)</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sel-year">Année</label>
            <select id="sel-year">
              <option value="all">Toutes les années</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sel-region">Région</label>
            <select id="sel-region">
              <option value="all">Toutes les régions</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sel-departement">Département</label>
            <select id="sel-departement">
              <option value="all">Tous les départements</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sel-pathology">Pathologie</label>
            <select id="sel-pathology">
              <option value="all">Toutes les pathologies</option>
              <option value="Diabète">Diabète</option>
              <option value="Hypertension artérielle">Hypertension artérielle</option>
              <option value="Asthme">Asthme</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="viz-container">
      <div id="viz-table">
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Région</th><th>Pathologie</th><th>Département</th><th>Année</th>
                <th id="th-indicator" style="text-align:right;">Nombre de cas</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div class="table-pagination" id="patho-table-pagination" style="display:none;justify-content:space-between;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap;">
          <span id="patho-page-info" style="font-size:0.9rem;color:#64748b;"></span>
          <div style="display:flex;gap:8px;">
            <button type="button" id="patho-prev-page" class="btn btn-ghost" style="padding:0.45rem 0.8rem;">Precedent</button>
            <button type="button" id="patho-next-page" class="btn btn-ghost" style="padding:0.45rem 0.8rem;">Suivant</button>
          </div>
        </div>
      </div>

      <div id="viz-chart" style="display:none;">
        <div class="chart-card" style="height:480px;">
          <canvas id="chart-canvas"></canvas>
          <div id="chart-empty" class="empty" style="display:none;">Aucune donnee disponible pour cette selection.</div>
        </div>
      </div>

      <div id="viz-map" style="display:none;">
        <div class="map-mode-controls">
          <label for="sel-map-mode">Affichage :</label>
          <select id="sel-map-mode" onchange="setMapMode(this.value)">
            <option value="region">Par régions</option>
            <option value="departement">Par départements</option>
          </select>
        </div>
        <div id="plotly-div" class="plotly-chart"></div>
      </div>
    </div>
  <script>
    window.PATHOLOGIES_CONFIG = {
      apiPathologiesUrl: "{{ url_for('pathologies_api.pathologies') }}",
      apiRegionsUrl: "{{ url_for('api.regions') }}",
      apiDepartmentsBaseUrl: "{{ url_for('api.departements', region_id=0) }}",
    };
  </script>
  <script src="{{ url_for('static', filename='js/pathologies.js') }}"></script>
{% endblock %}
