<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titre %}AMELI Data{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="topbar">
    <a href="{{ url_for('accueil.index') }}" class="topbar-brand">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <span>AMELI Data</span>
    </a>
  </header>

  <nav class="primary-nav">
    <a href="{{ url_for('accueil.index') }}"
       class="{% if request.endpoint == 'accueil.index' %}active{% endif %}">
      Accueil
    </a>
    <a href="{{ url_for('dashboard.medicaments') }}"
       class="{% if request.endpoint == 'dashboard.prescriptions' %}active{% endif %}">
      Prescriptions
    </a>
    <a href="{{ url_for('dashboard.professionnels') }}"
       class="{% if request.endpoint == 'dashboard.professionnels' %}active{% endif %}">
      Professionnels de santé
    </a>
    <a href="{{ url_for('contact.index') }}"
       class="{% if request.endpoint in ['contact.index', 'contact.envoyer'] %}active{% endif %}">
      Contact
    </a>
  </nav>

  <main>
    {% block contenu %}{% endblock %}
  </main>

  <footer>
    SAE 2.01 · BUT Informatique · IUT de Créteil-Vitry
  </footer>

</body>
</html>
